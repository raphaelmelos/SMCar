<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Estoque de Veículos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="topo">
    <h1>SMCar</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="estoque.html">Estoque</a>
    </nav>
</header>

<!-- MAIN -->
<main class="estoque">
    <h2>Veículos Disponíveis</h2>

    <div id="lista-veiculos"></div>
</main>

<!-- FOOTER -->
<footer class="rodape">
    <p>© 2026 SMCar, Todos os Direitos Reservados.</p>
</footer>

<!-- SCRIPT -->
<script>
const veiculos = [
    {
        id: 1,
        nome: "Diablo",
        marca: "Lamborghini",
        ano: 1998,
        preco: 2.700000,
        imagem: "img/diablo.jpg"
    },
    {
        id: 2,
        nome: "NSX",
        marca: "Honda",
        ano: 1990,
        preco: 3.200000,
        imagem: "img/nsx.jpg"
    },
    {
        id: 3,
        nome: "Testarossa",
        marca: "Ferrari",
        ano: 1990,
        preco: 2.700000 ,
        imagem: "img/testarossa.png"
    },
{
     id: 4,
        nome: "959",
        marca: "Porsche",
        ano: 1989,
        preco: 2000000,
        imagem: "img/porsche.jpg"
}
];

function listarVeiculos() {
    const lista = document.getElementById("lista-veiculos");
    lista.innerHTML = "";

    for (let i = 0; i < veiculos.length; i++) {
        const v = veiculos[i];

        const card = document.createElement("div");
        card.classList.add("card");

        card.innerHTML = `
            <img src="${v.imagem}" alt="${v.nome}">
            <h3>${v.nome}</h3>
            <p><strong>Marca:</strong> ${v.marca}</p>
            <p><strong>Ano:</strong> ${v.ano}</p>
            <p><strong>Preço:</strong> R$ ${v.preco}</p>
        `;

        lista.appendChild(card);
    }
}

listarVeiculos();
</script>

</body>
</html>

<head>

<body>

    <!-- HEADER -->

            <a href="index.html"><img src="/assests/logo2.png" SMCar></a>
        </div>

        <div class="buscaHeader">
            <input type="text" placeholder="Buscar veículos...">
            <button><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                    viewBox="0 0 24 24">
                    <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
                    <path
                        d="m17.06 14.94-2.8-1.34A6.96 6.96 0 0 0 16 9c0-3.86-3.14-7-7-7S2 5.14 2 9s3.14 7 7 7c1.76 0 3.37-.66 4.6-1.74l1.34 2.8 5 5 2.12-2.12zM9 14c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5">
                    </path>
                </svg></button>
        </div>

        <div class="redesHeader">
            <img src="assests/pngtree-whatsapp-phone-icon-png-image_6315989.png" alt="WhatsApp">
            <img src="assests/Instagram_icon.png" alt="Instagram">
        </div>
    </header>
    <!--NAV-->
    <nav class="menuHeader">
    <a href="index.html">HOME</a>

    <!-- MAIN -->

    <h1><Strong>Estoque de Veículos</Strong></h1>

    <main class="estoque">
        <h2>Veículos Disponíveis</h2>

        <div id="lista-veiculos"></div>
    </main>

    <!-- FOOTER -->
    <footer class="rodape">
        <p>© 2026 SMCar, Todos os Direitos Reservados.</p>
    </footer>

    <!-- SCRIPT -->
    <script>
        const veiculos = [
            {
                id: 1,
                nome: "Diablo",
                marca: "Lamborghini",
                ano: 1998,
                preco: 2.700000,
                imagem: "img/diablo.jpg"
            },
            {
                id: 2,
                nome: "NSX",
                marca: "Honda",
                ano: 1990,
                preco: 3.200000,
                imagem: "img/nsx.jpg"
            },
            {
                id: 3,
                nome: "Testarossa",
                marca: "Ferrari",
                ano: 1990,
                preco: 2.700000,
                imagem: "img/testarossa.png"
            },
            {
                id: 4,
                nome: "959",
                marca: "Porsche",
                ano: 1989,
                preco: 2000000,
                imagem: "img/porsche.jpg"
            }
        ];

        function listarVeiculos() {
            const lista = document.getElementById("lista-veiculos");
            lista.innerHTML = "";

            for (let i = 0; i < veiculos.length; i++) {
                const v = veiculos[i];

                const card = document.createElement("div");
                card.classList.add("card");

                card.innerHTML = `
            <img src="${v.imagem}" alt="${v.nome}">
            <h3>${v.nome}</h3>
            <p><strong>Marca:</strong> ${v.marca}</p>
            <p><strong>Ano:</strong> ${v.ano}</p>
            <p><strong>Preço:</strong> R$ ${v.preco}</p>
        `;

                lista.appendChild(card);
            }
        }

        listarVeiculos();
    </script>

</body>

</html>
